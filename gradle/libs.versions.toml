[versions]
# Verified against dl.google.com/dl/android/maven2 and repo1.maven.org (July 2026).
agp = "9.3.0"
kotlin = "2.4.10"
coroutines = "1.11.0"
serializationJson = "1.11.0"
okhttp = "5.4.0"
securityCrypto = "1.1.0"
# Every version before 1.0.20260102 calls CompletableFuture.newIncompleteFuture() unguarded in
# GoBackend.VpnService.onDestroy. That method only exists from API 31, so bringing the tunnel down
# crashed the process on every device below Android 12 (verified on Fire OS 8 / API 30).
# 1.0.20260102 adds the SDK_INT guard and raises its own minSdk to 24, which forces ours to 24 too.
wireguard = "1.0.20260102"
coreKtx = "1.17.0"
activity = "1.11.0"
lifecycle = "2.9.4"
constraintlayout = "2.2.1"

[libraries]
androidx-core-ktx = { module = "androidx.core:core-ktx", version.ref = "coreKtx" }
androidx-activity-ktx = { module = "androidx.activity:activity-ktx", version.ref = "activity" }
androidx-lifecycle-runtime-ktx = { module = "androidx.lifecycle:lifecycle-runtime-ktx", version.ref = "lifecycle" }
androidx-constraintlayout ={ module = "androidx.constraintlayout:constraintlayout", version.ref = "constraintlayout" }
androidx-security-crypto = { module = "androidx.security:security-crypto", version.ref = "securityCrypto" }
kotlinx-coroutines-android = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-android", version.ref = "coroutines" }
kotlinx-serialization-json = { module = "org.jetbrains.kotlinx:kotlinx-serialization-json", version.ref = "serializationJson" }
okhttp = { module = "com.squareup.okhttp3:okhttp", version.ref = "okhttp" }
wireguard-tunnel = { module = "com.wireguard.android:tunnel", version.ref = "wireguard" }

[plugins]
android-application = { id = "com.android.application", version.ref = "agp" }
kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
kotlin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
