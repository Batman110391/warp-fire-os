name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build release APK
        env:
          # Absent secrets fall back to debug signing, so manual dispatch still produces an APK.
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Verify APK exists and rename to the stable asset name
        run: |
          test -f app/build/outputs/apk/release/app-release.apk
          cp app/build/outputs/apk/release/app-release.apk warp-firetv.apk
          ls -l warp-firetv.apk

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: warp-firetv-apk
          path: warp-firetv.apk
          if-no-files-found: error

      - name: Create / update GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: warp-firetv.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
